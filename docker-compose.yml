version: '3.9'
services:
  db:
    image: postgres:15-alpine
    environment: { POSTGRES_DB: gt_main, POSTGRES_USER: zyane, POSTGRES_PASSWORD: change_me }
    volumes: [ pg:/var/lib/postgresql/data ]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U zyane"], interval: 5s, retries: 5 }
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [ rds:/data ]
  api:
    build: ./backend
    environment:
      DB_HOST: db
      DB_USER: zyane
      DB_PASS: change_me
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      IGDB_CLIENT: ${IGDB_CLIENT}
      IGDB_SECRET: ${IGDB_SECRET}
    depends_on: { db: { condition: service_healthy }, redis: { condition: service_started } }
    ports: ["8080:8080"]
  nginx:
    image: nginx:alpine
    volumes: [ ./nginx.conf:/etc/nginx/conf.d/default.conf ]
    ports: ["80:80"]
    depends_on: [api]
volumes: { pg, rds }

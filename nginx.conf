upstream api { server api:8080; }
map $http_upgrade $conn { default upgrade; '' close; }
server {
    listen 80;
    location /api/ { proxy_pass http://api/api/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /ws/ {
        proxy_pass http://api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $conn;
        proxy_set_header Host $host;
    }
}

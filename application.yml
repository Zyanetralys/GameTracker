spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/gt_main
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: 12
      connection-timeout: 15000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET}
    ttl-ms: 86400000
  igdb:
    client-id: ${IGDB_CLIENT}
    client-secret: ${IGDB_SECRET}
    base-url: https://api.igdb.com/v4

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameTracker // ZYANETRALYS</title>
  <style>
    /* VARIABLES Y BASE */
    :root {
      --bg: #030408; --bg-2: #0a0c14; --surface: #0f111a; --surface-2: #151825;
      --border: #222536; --border-glow: rgba(0, 240, 255, 0.15);
      --text: #e8eaf0; --text-2: #8a90a8; --text-3: #555b75;
      --accent: #00f0ff; --accent-2: #00b4d8; --accent-glow: rgba(0, 240, 255, 0.25);
      --warn: #ff003c; --warn-glow: rgba(255, 0, 60, 0.25);
      --ok: #bfff00; --ok-glow: rgba(191, 255, 0, 0.2);
      --radius: 8px; --shadow: 0 8px 32px rgba(0,0,0,0.6);
      --font-ui: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
    body { font-family: var(--font-ui); background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; overflow-x: hidden; position: relative; }
    
    /* FONDO CYBERPUNK Y GRID */
    body::before {
      content: ""; position: fixed; inset: 0; z-index: -2;
      background: radial-gradient(circle at 20% 30%, rgba(0,240,255,0.04) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(255,0,60,0.04) 0%, transparent 40%);
    }
    body::after {
      content: ""; position: fixed; inset: 0; z-index: -1; opacity: 0.03; pointer-events: none;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-2); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

    /* HEADER */
    header { position: sticky; top: 0; z-index: 40; display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1.5rem; background: rgba(10,12,20,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .brand { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.3px; display: flex; align-items: center; gap: 0.5rem; }
    .brand span { color: var(--accent); text-shadow: 0 0 8px var(--accent-glow); }
    .sys-pill { display: flex; align-items: center; gap: 0.4rem; background: rgba(0,240,255,0.08); color: var(--accent); padding: 0.3rem 0.7rem; border-radius: 4px; font-size: 0.65rem; font-family: var(--font-mono); font-weight: 600; border: 1px solid rgba(0,240,255,0.2); }
    .dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; box-shadow:0 0 4px var(--accent); } 50% { opacity:0.3; box-shadow:none; } }

    /* NAV */
    nav { display: flex; gap: 0.3rem; padding: 0.6rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--surface); overflow-x: auto; scrollbar-width: none; }
    nav::-webkit-scrollbar { display: none; }
    nav button { background: transparent; border: none; color: var(--text-2); padding: 0.5rem 0.9rem; font-size: 0.75rem; font-weight: 500; cursor: pointer; border-radius: 4px; transition: all 0.2s; white-space: nowrap; position: relative; text-transform: uppercase; letter-spacing: 0.5px; }
    nav button:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    nav button.active { color: var(--accent); background: rgba(0,240,255,0.1); border: 1px solid rgba(0,240,255,0.2); }
    nav button.active::after { content: ""; position: absolute; bottom: -0.6rem; left: 50%; transform: translateX(-50%); width: 30%; height: 2px; background: var(--accent); box-shadow: 0 0 6px var(--accent); }

    /* MAIN */
    main { padding: 1.2rem 1.5rem 3rem; max-width: 1200px; margin: 0 auto; min-height: calc(100vh - 110px); }
    .view { animation: slideIn 0.25s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* CONTROLES */
    .controls { display: flex; gap: 0.6rem; margin-bottom: 1.2rem; flex-wrap: wrap; align-items: center; }
    .search-box { flex: 1; min-width: 200px; position: relative; }
    .search-box input { width: 100%; padding: 0.65rem 0.8rem 0.65rem 2.2rem; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); font-size: 0.8rem; transition: all 0.2s; font-family: var(--font-ui); }
    .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
    .search-box::before { content: ">"; position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--text-3); font-family: var(--font-mono); font-size: 0.9rem; }
    .btn { padding: 0.6rem 1rem; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.4rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn:hover { background: var(--border); border-color: var(--text-3); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-2); box-shadow: 0 0 12px var(--accent-glow); }
    .btn.warn { background: var(--warn); color: #fff; border-color: var(--warn); }
    .btn.warn:hover { box-shadow: 0 0 12px var(--warn-glow); }
    .btn.sm { padding: 0.4rem 0.6rem; font-size: 0.65rem; }

    /* GRID Y CARDS */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; transition: all 0.25s; position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 0.7rem; }
    .card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 6px 20px rgba(0,240,255,0.1); }
    .card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0; transition: opacity 0.3s; }
    .card:hover::before { opacity: 1; }
    .card-actions { position: absolute; top: 0.6rem; right: 0.6rem; display: flex; gap: 0.3rem; opacity: 0; transition: opacity 0.2s; }
    .card:hover .card-actions { opacity: 1; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.2rem; }
    .card-title { font-weight: 600; font-size: 0.95rem; line-height: 1.2; }
    .rating { font-weight: 700; color: var(--ok); display: flex; align-items: center; gap: 0.2rem; font-size: 0.8rem; font-family: var(--font-mono); }
    .tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.2rem; }
    .tag { font-size: 0.6rem; padding: 0.2rem 0.4rem; background: rgba(0,240,255,0.08); color: var(--accent); border-radius: 3px; border: 1px solid rgba(0,240,255,0.15); font-family: var(--font-mono); text-transform: uppercase; }
    .tag.pending { background: rgba(255,0,60,0.08); color: var(--warn); border-color: rgba(255,0,60,0.15); }
    .tag.fav { background: rgba(191,255,0,0.08); color: var(--ok); border-color: rgba(191,255,0,0.15); }
    .progress-wrap { margin-top: auto; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--text-2); margin-bottom: 0.3rem; font-family: var(--font-mono); }
    .progress-bar { height: 4px; background: var(--surface-2); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--ok)); border-radius: 2px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

    /* ESTADOS VACIOS Y SKELETON */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-2); font-family: var(--font-mono); }
    .empty-state .icon { font-size: 2rem; margin-bottom: 0.8rem; opacity: 0.3; display: block; }
    .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface-2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: var(--radius); height: 130px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* MATCHMAKING */
    .mm-container { max-width: 560px; margin: 1rem auto; text-align: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; position: relative; overflow: hidden; }
    .mm-ring { width: 90px; height: 90px; border: 2px solid var(--border); border-top: 2px solid var(--accent); border-radius: 50%; margin: 0 auto 1rem; animation: spin 1s linear infinite; display: none; }
    .mm-ring.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .elo { font-size: 2.6rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--ok)); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 0.3rem; font-family: var(--font-mono); }
    .mm-status { color: var(--text-2); font-size: 0.8rem; margin-bottom: 1rem; min-height: 1.2em; font-family: var(--font-mono); }
    .match-modal { background: var(--surface-2); border: 1px solid var(--ok); border-radius: var(--radius); padding: 1rem; margin-top: 0.8rem; display: none; animation: pop 0.25s ease; }
    .match-modal.show { display: block; }
    @keyframes pop { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
    .match-actions { display: flex; gap: 0.5rem; margin-top: 0.6rem; justify-content: center; }
    .role-selector { display: flex; gap: 0.3rem; justify-content: center; margin: 0.8rem 0; flex-wrap: wrap; }
    .role-btn { padding: 0.4rem 0.8rem; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-2); border-radius: 4px; cursor: pointer; transition: 0.2s; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; font-family: var(--font-mono); }
    .role-btn:hover { background: var(--border); }
    .role-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
    .history-list { margin-top: 1rem; text-align: left; border-top: 1px solid var(--border); padding-top: 0.8rem; max-height: 120px; overflow-y: auto; }
    .history-item { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-2); margin-bottom: 0.3rem; font-family: var(--font-mono); padding: 0.3rem 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .history-item .win { color: var(--ok); } .history-item .loss { color: var(--warn); }

    /* CLANES */
    .clan-card { background: linear-gradient(145deg, var(--surface), var(--surface-2)); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; display: flex; flex-direction: column; gap: 0.7rem; position: relative; overflow: hidden; }
    .clan-banner { height: 35px; background: linear-gradient(90deg, #1a1c29, #0d0e17); border-radius: 4px; margin-bottom: -0.3rem; position: relative; }
    .clan-banner::after { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(255,255,255,0.04) 6px, rgba(255,255,255,0.04) 12px); }
    .clan-info { margin-top: 0.2rem; }
    .clan-name { font-weight: 700; font-size: 1rem; margin-bottom: 0.1rem; }
    .clan-meta { display: flex; gap: 0.7rem; font-size: 0.7rem; color: var(--text-2); font-family: var(--font-mono); }
    .role-badge { display: inline-block; padding: 0.15rem 0.4rem; background: rgba(255,0,60,0.1); color: var(--warn); border-radius: 3px; font-size: 0.6rem; font-weight: 600; margin-bottom: 0.5rem; text-transform: uppercase; font-family: var(--font-mono); }
    .invite-field { width: 100%; padding: 0.5rem; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-size: 0.75rem; margin-top: 0.3rem; font-family: var(--font-mono); }
    .invite-field:focus { border-color: var(--accent); }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 50; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; width: 90%; max-width: 400px; transform: translateY(10px) scale(0.97); transition: transform 0.2s cubic-bezier(0.2,0.8,0.2,1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal h3 { font-size: 1rem; margin-bottom: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group { margin-bottom: 0.7rem; }
    .form-group label { display: block; font-size: 0.65rem; color: var(--text-2); margin-bottom: 0.2rem; font-family: var(--font-mono); text-transform: uppercase; }
    .form-input { width: 100%; padding: 0.5rem; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-size: 0.8rem; }
    .form-input:focus { border-color: var(--accent); }
    .form-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 0.8rem; }

    /* TOAST */
    #toast-container { position: fixed; bottom: 1.2rem; right: 1.2rem; z-index: 60; display: flex; flex-direction: column; gap: 0.4rem; pointer-events: none; max-width: 280px; }
    .toast { background: var(--surface-2); border-left: 3px solid var(--accent); color: var(--text); padding: 0.7rem 0.9rem; border-radius: 4px; box-shadow: 0 6px 16px rgba(0,0,0,0.4); transform: translateX(120%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); pointer-events: all; font-size: 0.75rem; font-family: var(--font-mono); }
    .toast.show { transform: translateX(0); }
    .toast.ok { border-color: var(--ok); } .toast.warn { border-color: var(--warn); }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      header, nav, main { padding-left: 1rem; padding-right: 1rem; }
      .grid { grid-template-columns: 1fr; }
      .controls { flex-direction: column; align-items: stretch; }
      .search-box { min-width: auto; }
      .mm-container { margin: 0.5rem auto; padding: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">GAMETRACKER <span>// ZYANETRALYS</span></div>
    <div class="sys-pill"><span class="dot"></span> SISTEMA ACTIVO</div>
  </header>

  <nav id="nav">
    <button data-tab="library" class="active">BIBLIOTECA</button>
    <button data-tab="pending">PENDIENTES</button>
    <button data-tab="fav">FAVORITOS</button>
    <button data-tab="mm">MATCHMAKING</button>
    <button data-tab="clans">CLANES</button>
    <button data-tab="stats">ESTADISTICAS</button>
  </nav>

  <main id="app"></main>

  <div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal-content"></div></div>
  <div id="toast-container"></div>

  <script>
    // CONFIGURACION INICIAL Y DATOS POR DEFECTO
    const DEFAULTS = {
      games: [
        { id: 'g1', title: 'Helldivers 2', rating: 8.7, tags: ['COOP', 'TACTICO', 'SHOOTER'], status: 'played', progress: 100 },
        { id: 'g2', title: 'Elden Ring', rating: 9.6, tags: ['SOULS', 'MUNDO ABIERTO', 'RPG'], status: 'fav', progress: 100 },
        { id: 'g3', title: "Baldur's Gate 3", rating: 9.4, tags: ['CRPG', 'NARRATIVO', 'COOP'], status: 'played', progress: 88 },
        { id: 'g4', title: 'Valorant', rating: 7.9, tags: ['COMPETITIVO', 'FPS', '5V5'], status: 'pending', progress: 0 },
        { id: 'g5', title: 'Cyberpunk 2077', rating: 8.3, tags: ['RPG', 'SCI-FI', 'ACCION'], status: 'pending', progress: 35 },
        { id: 'g6', title: 'Counter-Strike 2', rating: 8.1, tags: ['FPS', 'COMPETITIVO', 'TACTICO'], status: 'played', progress: 100 },
        { id: 'g7', title: 'Zelda: Tears of the Kingdom', rating: 9.7, tags: ['AVENTURA', 'PUZZLES', 'NINTENDO'], status: 'fav', progress: 100 },
        { id: 'g8', title: 'Hades II', rating: 9.1, tags: ['ROGUELIKE', 'ACCION', 'INDIE'], status: 'pending', progress: 15 },
        { id: 'g9', title: 'Apex Legends', rating: 8.4, tags: ['BATTLE ROYALE', 'FPS', 'COOP'], status: 'played', progress: 95 },
        { id: 'g10', title: 'Final Fantasy XIV', rating: 9.2, tags: ['MMORPG', 'NARRATIVO', 'COOP'], status: 'played', progress: 70 }
      ],
      user: { elo: 1420, role: 'DPS', clanId: null },
      clans: [
        { id: 'c1', name: 'VANGUARDIA TACTICA', members: 42, role: 'OFICIAL', founded: '2023' },
        { id: 'c2', name: 'LOBO DE MADRID', members: 18, role: 'MIEMBRO', founded: '2024' },
        { id: 'c3', name: 'ZERO LATENCY', members: 156, role: 'CREADOR', founded: '2022' }
      ],
      mmHistory: []
    };

    // ALMACENAMIENTO LOCAL
    const Store = {
      data: null,
      init() {
        try { this.data = JSON.parse(localStorage.getItem('gt_data')) || JSON.parse(JSON.stringify(DEFAULTS)); } 
        catch { this.data = JSON.parse(JSON.stringify(DEFAULTS)); }
      },
      save() { localStorage.setItem('gt_data', JSON.stringify(this.data)); },
      addGame(g) { this.data.games.unshift(g); this.save(); },
      updateGame(id, patch) { const i = this.data.games.findIndex(x => x.id === id); if(i!==-1){ Object.assign(this.data.games[i], patch); this.save(); } },
      removeGame(id) { this.data.games = this.data.games.filter(x => x.id !== id); this.save(); },
      updateUser(p) { Object.assign(this.data.user, p); this.save(); },
      joinClan(id) { const c = this.data.clans.find(x => x.id === id); if(c) { c.members++; this.data.user.clanId = id; this.save(); } }
    };

    // ESTADO DE LA INTERFAZ
    const State = { tab: 'library', query: '', page: 1, perPage: 8, mm: { active: false, time: 0, found: false }, mmTimer: null };

    // UTILIDADES UI
    const UI = {
      $(s) { return document.querySelector(s); },
      $$(s) { return document.querySelectorAll(s); },
      toast(msg, type='ok') {
        const c = this.$('#toast-container');
        const t = document.createElement('div');
        t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t);
        requestAnimationFrame(() => t.classList.add('show'));
        setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
      },
      openModal(html) { this.$('#modal-content').innerHTML = html; this.$('#modal-overlay').classList.add('open'); this.$('#modal-overlay').onclick = e => { if(e.target === this.$('#modal-overlay')) this.closeModal(); }; },
      closeModal() { this.$('#modal-overlay').classList.remove('open'); }
    };

    // CONTROLADOR PRINCIPAL
    const App = {
      async render() {
        UI.$('#app').innerHTML = '<div class="grid">' + Array(4).fill('<div class="skeleton"></div>').join('') + '</div>';
        await new Promise(r => setTimeout(r, 300));
        
        const map = { library: vLib, pending: ()=>vLib('pending'), fav: ()=>vLib('fav'), mm: vMM, clans: vClans, stats: vStats };
        UI.$('#app').innerHTML = `<div class="view">${map[State.tab]()}</div>`;
        this.bind();
      },
      bind() {
        const s = UI.$('#search'); if(s) s.addEventListener('input', e => { State.query = e.target.value; State.page = 1; this.render(); });
        const cs = UI.$('#clanSearch'); if(cs) cs.addEventListener('input', e => {
          const q = e.target.value.toLowerCase();
          UI.$$('.clan-card').forEach(c => c.style.display = c.dataset.name.includes(q) ? 'flex' : 'none');
        });
        UI.$$('nav button').forEach(b => {
          b.onclick = () => {
            if(b.dataset.tab === State.tab) return;
            UI.$$('nav button').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            State.tab = b.dataset.tab; State.page = 1; State.query = ''; this.render();
          };
        });
      },
      changePage(d) { State.page += d; this.render(); },
      showAdd() {
        UI.openModal(`
          <h3>REGISTRAR JUEGO</h3>
          <div class="form-group"><label>TITULO</label><input type="text" id="m-title" class="form-input"></div>
          <div class="form-group"><label>RATING (1-10)</label><input type="number" id="m-rating" class="form-input" min="1" max="10" value="7.5"></div>
          <div class="form-group"><label>ESTADO</label><select id="m-status" class="form-input"><option value="played">JUGADO</option><option value="pending">PENDIENTE</option><option value="fav">FAVORITO</option></select></div>
          <div class="form-group"><label>ETIQUETAS (SEPARADAS POR COMA)</label><input type="text" id="m-tags" class="form-input" placeholder="RPG, COOP, INDIE"></div>
          <div class="form-group"><label>PROGRESO (0-100)</label><input type="number" id="m-prog" class="form-input" min="0" max="100" value="0"></div>
          <div class="form-actions">
            <button class="btn" onclick="UI.closeModal()">CANCELAR</button>
            <button class="btn primary" onclick="App.saveGame()">GUARDAR</button>
          </div>`);
        UI.$('#m-title').focus();
      },
      saveGame() {
        const t = UI.$('#m-title').value.trim(); if(!t) return UI.toast('TITULO OBLIGATORIO', 'warn');
        Store.addGame({ id:'g'+Date.now(), title:t, rating: parseFloat(UI.$('#m-rating').value)||5, status: UI.$('#m-status').value, tags: UI.$('#m-tags').value.split(',').map(x=>x.trim().toUpperCase()).filter(Boolean), progress: parseInt(UI.$('#m-prog').value)||0 });
        UI.closeModal(); UI.toast('JUEGO REGISTRADO'); App.render();
      },
      editGame(id) {
        const g = Store.data.games.find(x=>x.id===id); if(!g) return;
        UI.openModal(`
          <h3>EDITAR: ${g.title}</h3>
          <div class="form-group"><label>RATING</label><input type="number" id="m-rating" class="form-input" value="${g.rating}"></div>
          <div class="form-group"><label>ESTADO</label><select id="m-status" class="form-input"><option value="played" ${g.status==='played'?'selected':''}>JUGADO</option><option value="pending" ${g.status==='pending'?'selected':''}>PENDIENTE</option><option value="fav" ${g.status==='fav'?'selected':''}>FAVORITO</option></select></div>
          <div class="form-group"><label>PROGRESO</label><input type="number" id="m-prog" class="form-input" value="${g.progress}"></div>
          <div class="form-actions">
            <button class="btn" onclick="UI.closeModal()">CANCELAR</button>
            <button class="btn primary" onclick="App.updateGame('${id}')">ACTUALIZAR</button>
          </div>`);
      },
      updateGame(id) { Store.updateGame(id, { rating: parseFloat(UI.$('#m-rating').value), status: UI.$('#m-status').value, progress: parseInt(UI.$('#m-prog').value) }); UI.closeModal(); UI.toast('CAMBIOS GUARDADOS'); App.render(); },
      removeGame(id) { if(!confirm('CONFIRMAR ELIMINACION')) return; Store.removeGame(id); UI.toast('REGISTRO ELIMINADO', 'warn'); App.render(); },
      toggleMM() {
        if(State.mm.active) {
          State.mm.active = false; State.mm.found = false; State.mm.time = 0; clearTimeout(State.mmTimer);
          UI.toast('BUSQUEDA CANCELADA', 'warn');
        } else {
          State.mm.active = true; State.mm.found = false; State.mm.time = 0;
          UI.toast('ENTRANDO A COLA...');
          State.mmTimer = setTimeout(() => { if(State.mm.active) { State.mm.found = true; UI.toast('PARTIDA LOCALIZADA'); } App.render(); }, 2500 + Math.random()*3000);
        }
        App.render();
      },
      acceptMM() {
        State.mm.active = false; State.mm.found = false; State.mm.time = 0; clearTimeout(State.mmTimer);
        const win = Math.random() > 0.45; const delta = win ? Math.floor(15+Math.random()*10) : -Math.floor(10+Math.random()*12);
        const newElo = Math.max(100, Store.data.user.elo + delta);
        Store.updateUser({ elo: newElo });
        Store.data.mmHistory.unshift({ op: 'AGENTE_X9', win, delta, date: new Date().toLocaleTimeString() });
        UI.toast(win ? 'VICTORIA. ELO +' + delta : 'DERROTA. ELO ' + delta, win ? 'ok' : 'warn'); App.render();
      },
      declineMM() { State.mm.found = false; UI.toast('PARTIDA RECHAZADA', 'warn'); App.render(); },
      joinClan(id) { Store.joinClan(id); UI.toast('SOLICITUD ENVIADA. ACEPTADO.'); App.render(); },
      selectRole(r) { Store.updateUser({ role: r }); App.render(); }
    };

    // VISTAS
    function vLib(filter=null) {
      let d = [...Store.data.games]; if(filter) d = d.filter(g=>g.status===filter);
      if(State.query) { const q=State.query.toLowerCase(); d = d.filter(g=>g.title.toLowerCase().includes(q) || g.tags.some(t=>t.toLowerCase().includes(q))); }
      const total = Math.ceil(d.length/State.perPage)||1; if(State.page>total) State.page=1;
      const slice = d.slice((State.page-1)*State.perPage, State.page*State.perPage);
      return `
        <div class="controls">
          <div class="search-box"><input type="text" id="search" placeholder="BUSCAR TITULO O ETIQUETA..." value="${State.query}"></div>
          <button class="btn" onclick="State.query='';State.page=1;App.render()">LIMPIAR</button>
          <button class="btn primary" onclick="App.showAdd()">+ NUEVO</button>
        </div>
        ${slice.length ? `<div class="grid">${slice.map(g=>`
          <div class="card" data-id="${g.id}">
            <div class="card-actions">
              <button class="btn sm" onclick="App.editGame('${g.id}')">EDITAR</button>
              <button class="btn sm" style="color:var(--warn)" onclick="App.removeGame('${g.id}')">ELIMINAR</button>
            </div>
            <div class="card-header"><div class="card-title">${g.title}</div><div class="rating">★ ${g.rating.toFixed(1)}</div></div>
            <div class="tags">${g.tags.map(t=>`<span class="tag ${t==='PENDING'?'pending':t==='FAV'?'fav':''}">${t}</span>`).join('')}</div>
            <div class="progress-wrap">
              <div class="progress-label"><span>${g.progress===100?'COMPLETADO':g.progress>0?'EN PROGRESO':'SIN INICIAR'}</span><span>${g.progress}%</span></div>
              <div class="progress-bar"><div class="progress-fill" style="width:${g.progress}%"></div></div>
            </div>
          </div>`).join('')}</div>` : `<div class="empty-state"><span class="icon">[ ]</span>DATOS NO ENCONTRADOS. AJUSTA FILTROS.</div>`}
        <div class="controls" style="justify-content:center; margin-top:1rem;">
          <button class="btn" onclick="App.changePage(-1)" ${State.page<=1?'disabled':''}>&lt; ANTERIOR</button>
          <span style="color:var(--text-2); font-size:0.75rem; font-family:var(--font-mono)">${State.page} / ${total}</span>
          <button class="btn" onclick="App.changePage(1)" ${State.page>=total?'disabled':''}>SIGUIENTE &gt;</button>
        </div>`;
    }

    function vMM() {
      const u = Store.data.user;
      return `
        <div class="mm-container">
          <div style="font-size:0.65rem; color:var(--text-3); letter-spacing:1px; margin-bottom:0.3rem;">RANGO ELO</div>
          <div class="elo">${u.elo}</div>
          <div class="mm-ring ${State.mm.active && !State.mm.found ? 'active' : ''}"></div>
          <div class="mm-status">${State.mm.found ? '>> Oponente localizado. Listo para sincronizar.' : State.mm.active ? `BUSCANDO JUGADORES... ${State.mm.time}s` : 'SELECCIONA ROL Y ACTIVA LA COLA.'}</div>
          <div class="role-selector">${['DPS','SUPPORT','IGL','FLEX'].map(r=>`<button class="role-btn ${u.role===r?'active':''}" onclick="App.selectRole('${r}')">${r}</button>`).join('')}</div>
          <div class="match-modal ${State.mm.found?'show':''}">
            <div style="font-weight:600; margin-bottom:0.3rem;">PARTIDA ENCONTRADA</div>
            <div style="color:var(--text-2); font-size:0.75rem; font-family:var(--font-mono)">OPONENTE: AGENTE_X9 | ROL: DPS | DELTA: +/-45 ELO</div>
            <div class="match-actions"><button class="btn primary sm" onclick="App.acceptMM()">ACEPTAR</button><button class="btn warn sm" onclick="App.declineMM()">RECHAZAR</button></div>
          </div>
          <button class="btn" style="margin-top:1rem; width:100%" onclick="App.toggleMM()">${State.mm.active ? 'CANCELAR BUSQUEDA' : 'INICIAR COLA'}</button>
          ${Store.data.mmHistory.length ? `<div class="history-list">${Store.data.mmHistory.slice(0,4).map(h=>`<div class="history-item"><span>${h.date} | ${h.op}</span><span class="${h.win?'win':'loss'}">${h.win?'VICTORIA':'DERROTA'} (${h.delta>0?'+':''}${h.delta})</span></div>`).join('')}</div>` : ''}
        </div>`;
    }

    function vClans() {
      const uId = Store.data.user.clanId;
      return `
        <div class="controls"><div class="search-box"><input type="text" id="clanSearch" placeholder="BUSCAR CLAN..."></div><button class="btn primary">+ CREAR</button></div>
        <div class="grid">${Store.data.clans.map(c=>{
          const isM = c.id===uId;
          return `<div class="clan-card" data-name="${c.name.toLowerCase()}">
            <div class="clan-banner"></div><div class="clan-info">
            <span class="role-badge">${isM ? 'MIEMBRO' : c.role}</span><div class="clan-name">${c.name}</div>
            <div class="clan-meta"><span>MIEMBROS: ${c.members}</span><span>FUNDADO: ${c.founded}</span></div></div>
            ${isM ? `<div style="background:var(--surface-2); padding:0.5rem; border-radius:4px; font-size:0.65rem; color:var(--text-2); font-family:var(--font-mono)">TOKEN: GT-${c.id.toUpperCase()}</div>` : `<button class="btn sm" style="width:100%; margin-top:0.5rem" onclick="App.joinClan('${c.id}')">SOLICITAR UNIÓN</button>`}
          </div>`}).join('')}</div>`;
    }

    function vStats() {
      const d = Store.data.games;
      const total = d.length; const played = d.filter(x=>x.status==='played').length; const favs = d.filter(x=>x.status==='fav').length;
      const avg = d.length ? (d.reduce((a,b)=>a+b.rating,0)/d.length).toFixed(1) : '0.0';
      return `
        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr))">
          <div class="card"><div class="card-header"><div class="card-title">TOTAL REGISTROS</div><div class="rating">${total}</div></div></div>
          <div class="card"><div class="card-header"><div class="card-title">COMPLETADOS</div><div class="rating">${played}</div></div></div>
          <div class="card"><div class="card-header"><div class="card-title">FAVORITOS</div><div class="rating">${favs}</div></div></div>
          <div class="card"><div class="card-header"><div class="card-title">RATING MEDIO</div><div class="rating">${avg}</div></div></div>
        </div>
        <div style="margin-top:1.5rem; padding:1rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius)">
          <div style="font-size:0.75rem; color:var(--text-3); margin-bottom:0.5rem; font-family:var(--font-mono)">ANÁLISIS DE ETIQUETAS</div>
          <div style="display:flex; flex-wrap:wrap; gap:0.5rem">${[...new Set(d.flatMap(x=>x.tags))].map(t=>{
            const count = d.filter(x=>x.tags.includes(t)).length;
            return `<span style="background:var(--surface-2); padding:0.3rem 0.6rem; border-radius:4px; font-size:0.7rem; font-family:var(--font-mono); border:1px solid var(--border)">${t}: ${count}</span>`}).join('')}</div>
        </div>`;
    }

    // INICIALIZACIÓN
    Store.init();
    document.addEventListener('DOMContentLoaded', () => App.render());
  </script>
</body>
</html>
